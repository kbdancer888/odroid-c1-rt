name: Build ODROID-C1 RT Armbian

on:
  # 允许在网页端手动触发构建并选择参数
  workflow_dispatch:
    inputs:
      branch:
        description: 'Armbian Kernel Branch'
        required: true
        default: 'current'
        type: choice
        options: ['current', 'edge', 'legacy']
      release:
        description: 'Debian/Ubuntu Release'
        required: true
        default: 'trixie'
        type: choice
        options: ['trixie', 'bullseye', 'noble', 'jammy']

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360  # 最大6小时，防止无限挂起

    steps:
      - name: Checkout Armbian Build Framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          fetch-depth: 0  # 必须完整克隆，否则 git describe 失败

     # - name: Free Disk Space (Critical!)
     #   uses: jlumbroso/free-disk-space@main
      #  with:
       #   tool-cache: false
       #   android: true
       #   dotnet: true
      #    haskell: true
      #    large-packages: true
      #    docker-images: true
      #    swap-storage: true

     # - name: Set up Docker Buildx
      #  uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
       uses: docker/setup-qemu-action@v3
       with:
            platforms: armhf  # 明确指定需要支持 armhf

      - name: Build ODROID-C1 RT Image
        run: |
          ./compile.sh build \
            BOARD=odroidc1 \
            BRANCH=current \
            RELEASE=trixie \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=yes \
            KERNEL_EXTRA_CONFIG="CONFIG_PREEMPT_RT=y" \
            KERNEL_CONFIGURE=no \
            DOWNLOAD_MIRROR=china \
            USE_CCACHE=yes

      - name: Upload Built Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-ODROID-C1-RT-${{ github.event.inputs.branch }}-${{ github.event.inputs.release }}
          path: output/images/*.img*
          retention-days: 7
          compression-level: 0  # img已是压缩格式，避免二次压缩浪费时间
